# theSFedu CRM — production stack for a VPS.
# Reads secrets from a `.env` file in this directory (see .env.production.example).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sfedu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-thesfedu_crm}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sfedu} -d ${POSTGRES_DB:-thesfedu_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sfedu}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-thesfedu_crm}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      NODE_ENV: production
      # Integrations (Section 7.10) — unset = simulation mode. See .env.production.example.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      SMS_API_URL: ${SMS_API_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER: ${SMS_SENDER:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      MANAGEMENT_IP_WHITELIST: ${MANAGEMENT_IP_WHITELIST:-}
      CRON_SECRET: ${CRON_SECRET:-}
    ports:
      # Bind to localhost only; put Nginx in front for TLS (see DEPLOYMENT.md).
      - "127.0.0.1:3000:3000"

volumes:
  dbdata:
